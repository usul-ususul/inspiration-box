<!doctype html>
<html lang="zh-CN" data-shadowless="true">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <title>设置</title>
</head>
<body class="page">
  <header class="details-titlebar" id="detailsDrag" data-tauri-drag-region>
    <span data-tauri-drag-region>ahhhh mmt</span>
    <button class="window-close" id="closeDetails" type="button" title="关闭">×</button>
  </header>
  <main>
    <div class="toolbar">
      <button class="secondary" id="back" type="button">返回浮条</button>
      <span class="status" id="detailNotice"></span>
    </div>

    <h1>ahhhh mmt</h1>
    <nav class="section-tabs" aria-label="设置分类">
      <button class="section-tab active" type="button" data-section="app">应用设置</button>
      <button class="section-tab" type="button" data-section="records">本地灵感</button>
      <button class="section-tab" type="button" data-section="sticky">便签</button>
    </nav>

    <section class="settings detail-section" id="appSection">
      <h2>应用设置</h2>
      <label>Notion 目标页链接</label>
      <input id="pageId" placeholder="直接粘贴 Notion 页面链接或页面 ID">
      <label>Notion integration token</label>
      <input id="token" type="password" placeholder="留空则保留已保存 token">
      <label class="checkbox">
        <input id="autostart" type="checkbox"> 开机自启
      </label>
      <label>召唤浮条快捷键</label>
      <input id="summonShortcut" class="shortcut-input" readonly placeholder="按下组合键">
      <span class="status" id="shortcutStatus"></span>
      <label>浮窗颜色</label>
      <input id="windowColor" type="color" value="#f8fafb">
      <label>浮窗透明度 <span id="opacityValue">100%</span></label>
      <input id="windowOpacity" type="range" min="0" max="1" step="0.05" value="1">
      <label class="checkbox">
        <input id="shadowless" type="checkbox"> 去掉窗口阴影（浮条、便签、菜单）
      </label>
      <label class="checkbox">
        <input id="moreTransparent" type="checkbox"> “更多”面板 / 便签菜单 改为透明
      </label>
      <label class="checkbox">
        <input id="inputTransparent" type="checkbox"> 输入框（浮条、长文本、便签）改为透明
      </label>
      <label class="checkbox">
        <input id="textStroke" type="checkbox"> 文字白色描边（全透明时保持可读）
      </label>
      <label class="checkbox">
        <input id="glassMode" type="checkbox"> 液态玻璃效果（毛玻璃，窗口背景虚化）
      </label>
      <label class="checkbox">
        <input id="enterDirectSave" type="checkbox"> 点击回车直接保存（跳过选择类别）
      </label>
      <button class="primary" id="saveSettings" type="button">保存设置</button>
      <span class="status" id="settingsStatus"></span>
      <div class="update-row">
        <div>
          <strong>应用更新</strong>
          <span class="status" id="updateStatus">每 24 小时自动检查一次。</span>
        </div>
        <button class="secondary" id="checkUpdate" type="button">手动检测更新</button>
      </div>
    </section>

    <section class="detail-section" id="recordsSection" hidden>
      <h2>本地灵感</h2>
      <div class="toolbar">
        <input id="search" placeholder="搜索内容或类别...">
        <button class="primary" id="refresh" type="button">刷新</button>
      </div>
      <div id="records"></div>
    </section>

    <section class="settings detail-section" id="stickySection" hidden>
      <h2>便签</h2>
      <textarea id="stickyEditor" class="settings-note" placeholder="编辑桌面便签内容..."></textarea>
      <label>便签模式</label>
      <div class="segmented" id="stickyModeControl">
        <button class="segment active" type="button" data-mode="free">自由拖动</button>
        <button class="segment" type="button" data-mode="edge">吸边隐藏</button>
      </div>
      <div class="actions">
        <button class="secondary" id="openSticky" type="button">打开桌面便签</button>
        <span class="spacer"></span>
        <span class="status" id="stickySettingsStatus">便签自动保存到本地。</span>
      </div>
    </section>
  </main>
  <script src="details.js"></script>
</body>
</html>
