<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <title>Sticky Note</title>
</head>
<body class="sticky-body">
  <div class="sticky-shell">
    <div class="sticky-titlebar" id="stickyDrag">
      <button class="sticky-icon" type="button" title="Menu">=</button>
      <span class="sticky-spacer"></span>
      <button class="sticky-icon" id="toRecord" type="button" title="Convert to inspiration">...</button>
      <button class="sticky-icon active" id="pinSticky" type="button" title="Pin">PIN</button>
      <button class="sticky-icon" id="minSticky" type="button" title="Minimize">-</button>
      <button class="sticky-icon" id="closeSticky" type="button" title="Close">x</button>
    </div>

    <div
      id="stickyNote"
      class="sticky-editor"
      contenteditable="true"
      spellcheck="false"
      data-placeholder="Click here to type..."
    ></div>

    <div class="sticky-toolbar">
      <button class="sticky-tool" type="button" data-command="bold" title="Bold"><b>B</b></button>
      <button class="sticky-tool" type="button" data-command="italic" title="Italic"><i>I</i></button>
      <button class="sticky-tool" type="button" data-command="underline" title="Underline"><u>U</u></button>
      <button class="sticky-tool" type="button" data-command="strikeThrough" title="Strike"><s>S</s></button>
      <button class="sticky-tool" type="button" data-command="insertUnorderedList" title="List">-</button>
      <button class="sticky-shot" id="screenShot" type="button">Screenshot</button>
      <span class="sticky-status" id="stickyStatus">Ready</span>
    </div>
  </div>
  <script src="sticky.js"></script>
</body>
</html>
