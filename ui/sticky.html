<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <title>&#20415;&#31614;</title>
</head>
<body class="sticky-body">
  <div class="sticky-shell">
    <div class="sticky-titlebar" id="stickyDrag">
      <button class="sticky-icon" type="button" title="&#33756;&#21333;">=</button>
      <span class="sticky-spacer"></span>
      <button class="sticky-icon" id="toRecord" type="button" title="&#36716;&#20026;&#28789;&#24863;">...</button>
      <button class="sticky-icon active" id="pinSticky" type="button" title="&#32622;&#39030;">PIN</button>
      <button class="sticky-icon" id="minSticky" type="button" title="&#26368;&#23567;&#21270;">-</button>
      <button class="sticky-icon" id="closeSticky" type="button" title="&#20851;&#38381;">x</button>
    </div>

    <div
      id="stickyNote"
      class="sticky-editor"
      contenteditable="true"
      spellcheck="false"
      data-placeholder="&#21333;&#20987;&#36825;&#37324;&#36755;&#20837;&#20415;&#31614;&#20869;&#23481;..."
    ></div>

    <div class="sticky-toolbar">
      <button class="sticky-tool" type="button" data-command="bold" title="&#21152;&#31895;"><b>B</b></button>
      <button class="sticky-tool" type="button" data-command="italic" title="&#26012;&#20307;"><i>I</i></button>
      <button class="sticky-tool" type="button" data-command="underline" title="&#19979;&#21010;&#32447;"><u>U</u></button>
      <button class="sticky-tool" type="button" data-command="strikeThrough" title="&#21024;&#38500;&#32447;"><s>S</s></button>
      <button class="sticky-tool" type="button" data-command="insertUnorderedList" title="&#21015;&#34920;">-</button>
      <button class="sticky-shot" id="screenShot" type="button">&#23631;&#24149;&#25130;&#22270;</button>
      <span class="sticky-status" id="stickyStatus">&#24050;&#20934;&#22791;</span>
    </div>
  </div>
  <script src="sticky.js"></script>
</body>
</html>
