<!doctype html>
<html lang="zh-CN" data-shadowless="true">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <title>&#20415;&#31614;</title>
</head>
<body class="sticky-body">
  <div class="sticky-shell">
    <div class="sticky-titlebar" id="stickyDrag">
      <button class="sticky-icon" id="stickyMenuButton" type="button" title="&#33756;&#21333;">&#9776;</button>
      <span class="sticky-spacer"></span>
      <button class="sticky-icon" id="newSticky" type="button" title="&#26032;&#24314;&#20415;&#31614;" aria-label="&#26032;&#24314;&#20415;&#31614;">&#43;</button>
      <button class="sticky-icon sticky-pin active" id="pinSticky" type="button" title="&#32622;&#39030;" aria-label="&#32622;&#39030;">&#128204;&#65038;</button>
      <button class="sticky-icon" id="minSticky" type="button" title="&#26368;&#23567;&#21270;">&#8722;</button>
      <button class="sticky-icon" id="closeSticky" type="button" title="&#20851;&#38381;">&#215;</button>
    </div>

    <div class="sticky-menu" id="stickyMenu" hidden>
      <div class="sticky-menu-row" aria-label="&#39068;&#33394;">
        <button class="sticky-swatch" type="button" data-color="purple" title="&#32043;&#33394;"></button>
        <button class="sticky-swatch" type="button" data-color="yellow" title="&#40644;&#33394;"></button>
        <button class="sticky-swatch" type="button" data-color="green" title="&#32511;&#33394;"></button>
        <button class="sticky-swatch" type="button" data-color="blue" title="&#34013;&#33394;"></button>
        <button class="sticky-swatch" type="button" data-color="pink" title="&#31881;&#33394;"></button>
        <button class="sticky-swatch" type="button" data-color="gray" title="&#28784;&#33394;"></button>
      </div>
      <div class="sticky-menu-row sticky-mode-row" aria-label="&#20415;&#31614;&#27169;&#24335;">
        <button class="sticky-mode-option active" type="button" data-mode="free">&#33258;&#30001;&#25302;&#21160;</button>
        <button class="sticky-mode-option" type="button" data-mode="edge">&#21560;&#36793;&#38544;&#34255;</button>
      </div>
    </div>

    <div
      id="stickyNote"
      class="sticky-editor"
      contenteditable="true"
      spellcheck="false"
      data-placeholder="&#21333;&#20987;&#36825;&#37324;&#36755;&#20837;&#20415;&#31614;&#20869;&#23481;..."
    ></div>

    <div class="sticky-toolbar">
      <button class="sticky-tool" type="button" data-command="bold" title="&#21152;&#31895; (Ctrl+B)"><b>B</b></button>
      <button class="sticky-tool" type="button" data-command="italic" title="&#26012;&#20307; (Ctrl+I)"><i>I</i></button>
      <button class="sticky-tool" type="button" data-command="underline" title="&#19979;&#21010;&#32447; (Ctrl+U)"><u>U</u></button>
      <button class="sticky-tool" type="button" data-command="strikeThrough" title="&#21024;&#38500;&#32447; (Ctrl+Shift+X)"><s>S</s></button>
      <button class="sticky-tool" type="button" data-command="insertUnorderedList" title="&#21015;&#34920;">&#9776;</button>
      <button class="sticky-shot" id="screenShot" type="button">&#23631;&#24149;&#25130;&#22270;</button>
      <span class="sticky-status" id="stickyStatus">&#24050;&#20934;&#22791;</span>
    </div>
  </div>
  <script>
    // 关闭和最小化按钮 — 内联脚本，不依赖外部文件
    (function() {
      var w = window.__TAURI__.window.getCurrentWindow();
      var invoke = window.__TAURI__.core.invoke;
      var windowLabel = w.label;
      var closeBtn = document.getElementById('closeSticky');
      var minBtn = document.getElementById('minSticky');
      if (closeBtn) {
        closeBtn.addEventListener('click', function() {
          // 先测最简单的 —— 调用 Rust 命令关闭窗口
          invoke('close_sticky_note', { windowLabel: windowLabel }).catch(function(e) {
            closeBtn.textContent = String(e).slice(0, 10);
          });
        });
        closeBtn.title = '关闭 ✓';
      }
      if (minBtn) {
        minBtn.addEventListener('click', function() {
          invoke('minimize_sticky_note', { windowLabel: windowLabel }).catch(function(e) {
            minBtn.textContent = String(e).slice(0, 10);
          });
        });
        minBtn.title = '最小化 ✓';
      }
    })();
  </script>
  <script src="sticky.js"></script>
</body>
</html>
