<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <title>便签</title>
</head>
<body class="sticky-body">
  <div class="sticky-shell">
    <div class="sticky-titlebar" id="stickyDrag">
      <button class="sticky-icon" type="button" title="菜单">☰</button>
      <span class="sticky-spacer"></span>
      <button class="sticky-icon" id="toRecord" type="button" title="转为灵感">···</button>
      <button class="sticky-icon active" id="pinSticky" type="button" title="置顶">⌖</button>
      <button class="sticky-icon" id="minSticky" type="button" title="最小化">−</button>
      <button class="sticky-icon" id="closeSticky" type="button" title="关闭">×</button>
    </div>

    <div id="stickyNote" class="sticky-editor" contenteditable="true" spellcheck="false"
      data-placeholder="单击这里输入便签内容..."></div>

    <div class="sticky-toolbar">
      <button class="sticky-tool" type="button" data-command="bold" title="加粗"><b>B</b></button>
      <button class="sticky-tool" type="button" data-command="italic" title="斜体"><i>I</i></button>
      <button class="sticky-tool" type="button" data-command="underline" title="下划线"><u>U</u></button>
      <button class="sticky-tool" type="button" data-command="strikeThrough" title="删除线"><s>S</s></button>
      <button class="sticky-tool" type="button" data-command="insertUnorderedList" title="列表">☷</button>
      <button class="sticky-shot" id="screenShot" type="button">▣ 屏幕截图</button>
      <span class="sticky-status" id="stickyStatus">已准备</span>
    </div>
  </div>
  <script src="sticky.js"></script>
</body>
</html>
