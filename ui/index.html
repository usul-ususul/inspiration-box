<!doctype html>
<html lang="zh-CN" data-shadowless="true">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <title>ahhhh mmt</title>
</head>
<body>
  <div class="shell">
    <div class="bar">
      <button class="quick-drag-handle" id="dragHandle" type="button"
        title="按住拖动浮条，点击或松开打开更多"
        data-tauri-drag-region>&#8942;&#8942;</button>
      <div class="more-menu" id="moreMenu" role="menu" hidden>
        <button class="more-item" data-action="details" role="menuitem" type="button">
          <span class="more-item-icon" aria-hidden="true">&#9881;</span>
          <span class="more-item-label">设置</span>
        </button>
        <button class="more-item" data-action="sticky" role="menuitem" type="button">
          <span class="more-item-icon" aria-hidden="true">&#9635;</span>
          <span class="more-item-label">便签</span>
        </button>
        <button class="more-item" data-action="expand" role="menuitem" type="button">
          <span class="more-item-icon" aria-hidden="true">&#10133;</span>
          <span class="more-item-label" data-expand-label>长文本</span>
        </button>
        <button class="more-item power-item" data-action="quit" role="menuitem" type="button">
          <span class="more-item-icon" aria-hidden="true">&#9211;</span>
          <span class="more-item-label">退出</span>
        </button>
      </div>
      <input id="quickInput" class="quick-input" placeholder="记录一下..." title="直接输入或粘贴，回车保存">
    </div>
    <section class="panel" id="panel" hidden>
      <textarea id="content" placeholder="输入长文本..."></textarea>
      <div class="preview" id="preview"><img id="previewImage" alt="待保存图片"></div>
      <div class="actions">
        <button class="secondary" id="image">添加图片</button>
        <input id="file" type="file" accept="image/*" hidden>
        <span class="spacer"></span>
        <button class="primary" id="save">保存</button>
      </div>
      <p class="status" id="status">支持粘贴或拖入图片，保存后自动同步 Notion。</p>
    </section>
  </div>
  <script src="main.js"></script>
</body>
</html>
