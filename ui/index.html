<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <title>ahhhh mmt</title>
</head>
<body>
  <div class="shell">
    <div class="bar">
      <span class="quick-drag-region" id="dragHandle" title="拖动浮条" aria-label="拖动浮条" data-tauri-drag-region>&#8942;&#8942;</span>
      <button class="icon more-button" id="more" type="button" title="更多操作" aria-expanded="false">•••</button>
      <div class="quick-actions" id="quickActions" hidden>
        <button class="icon" id="details" type="button" title="设置">⚙</button>
        <button class="icon" id="sticky" type="button" title="便签">▣</button>
        <button class="icon" id="expand" type="button" title="长文本">＋</button>
        <button class="icon power-button" id="quitApp" type="button" title="退出 ahhhh mmt">&#9211;</button>
      </div>
      <input id="quickInput" class="quick-input" placeholder="记录一下..." title="直接输入或粘贴，回车保存">
    </div>
    <section class="panel" id="panel" hidden>
      <textarea id="content" placeholder="输入长文本..."></textarea>
      <div class="preview" id="preview"><img id="previewImage" alt="待保存图片"></div>
      <div class="actions">
        <button class="secondary" id="image">添加图片</button>
        <input id="file" type="file" accept="image/*" hidden>
        <span class="spacer"></span>
        <button class="primary" id="save">保存</button>
      </div>
      <p class="status" id="status">支持粘贴或拖入图片，保存后自动同步 Notion。</p>
    </section>
  </div>
  <script src="main.js"></script>
</body>
</html>
